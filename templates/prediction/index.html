<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédiction Maladie Coronarienne - Hôpital Principal de Dakar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 30px;
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
        }
        
        .card-header h2 {
            font-size: 1.5em;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group .help-text {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: none;
        }
        
        .result-card.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .result-header {
            padding: 20px 30px;
            color: white;
        }
        
        .result-header.risk-eleve {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        
        .result-header.risk-modere {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }
        
        .result-header.risk-faible {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }
        
        .result-header h3 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }
        
        .result-body {
            padding: 30px;
        }
        
        .probability-bar {
            background: #f0f0f0;
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .probability-fill {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: bold;
            transition: width 0.5s ease;
            border-radius: 10px;
        }
        
        .probability-fill.risk-eleve {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
        }
        
        .probability-fill.risk-modere {
            background: linear-gradient(90deg, #f39c12, #e67e22);
        }
        
        .probability-fill.risk-faible {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-item .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
        }
        
        .info-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.8em;
            }
        }
        
        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Prédiction du Risque Cardiaque</h1>
            <p>Évaluation du risque de maladie coronarienne sur 10 ans</p>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h2>📋 Informations du Patient</h2>
            </div>
            <div class="card-body">
                <form id="predictionForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Sexe *</label>
                            <select id="male" required>
                                <option value="1">Masculin</option>
                                <option value="0">Féminin</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Âge *</label>
                            <input type="number" id="age" required placeholder="Ex: 55">
                            <div class="help-text">Années (20-100)</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Niveau d'éducation</label>
                            <select id="education">
                                <option value="1">Niveau 1</option>
                                <option value="2" selected>Niveau 2</option>
                                <option value="3">Niveau 3</option>
                                <option value="4">Niveau 4</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Fumeur actuel *</label>
                            <select id="currentSmoker" required>
                                <option value="0">Non</option>
                                <option value="1">Oui</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Cigarettes par jour</label>
                            <input type="number" id="cigsPerDay" value="0">
                            <div class="help-text">0 si non-fumeur</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Médicaments contre l'hypertension</label>
                            <select id="BPMeds">
                                <option value="0">Non</option>
                                <option value="1">Oui</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Antécédent AVC *</label>
                            <select id="prevalentStroke" required>
                                <option value="0">Non</option>
                                <option value="1">Oui</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Patient hypertendu *</label>
                            <select id="prevalentHyp" required>
                                <option value="0">Non</option>
                                <option value="1">Oui</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Patient diabétique *</label>
                            <select id="diabetes" required>
                                <option value="0">Non</option>
                                <option value="1">Oui</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Cholestérol total</label>
                            <input type="number" id="totChol" value="200">
                            <div class="help-text">mg/dL</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Pression artérielle systolique *</label>
                            <input type="number" id="sysBP" required placeholder="Ex: 120">
                            <div class="help-text">mmHg</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Pression artérielle diastolique *</label>
                            <input type="number" id="diaBP" required placeholder="Ex: 80">
                            <div class="help-text">mmHg</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Indice de masse corporelle (IMC)</label>
                            <input type="number" id="BMI" step="0.1" value="25">
                            <div class="help-text">kg/m²</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Fréquence cardiaque</label>
                            <input type="number" id="heartRate" value="75">
                            <div class="help-text">bpm</div>
                        </div>
                        
                        <div class="form-group">
                            <label>Taux de glucose</label>
                            <input type="number" id="glucose" value="80">
                            <div class="help-text">mg/dL</div>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-predict" id="submitBtn">
                        🔍 Prédire le risque
                    </button>
                </form>
            </div>
        </div>
        
        <div class="result-card" id="resultCard">
            <div class="result-header" id="resultHeader">
                <h3 id="resultTitle">Résultat</h3>
                <p id="resultSubtitle"></p>
            </div>
            <div class="result-body">
                <div class="probability-bar">
                    <div class="probability-fill" id="probabilityFill" style="width: 0%">
                        <span id="probabilityText">0%</span>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <div class="label">Niveau de risque</div>
                        <div class="value" id="riskLevel">-</div>
                    </div>
                    <div class="info-item">
                        <div class="label">Probabilité</div>
                        <div class="value" id="riskProbability">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('predictionForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultCard = document.getElementById('resultCard');
        const resultHeader = document.getElementById('resultHeader');
        const resultTitle = document.getElementById('resultTitle');
        const resultSubtitle = document.getElementById('resultSubtitle');
        const probabilityFill = document.getElementById('probabilityFill');
        const probabilityText = document.getElementById('probabilityText');
        const riskLevel = document.getElementById('riskLevel');
        const riskProbability = document.getElementById('riskProbability');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Désactiver le bouton et montrer le chargement
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Prédiction en cours...';
            
            // Récupérer les données
            const data = {
                male: parseInt(document.getElementById('male').value),
                age: parseFloat(document.getElementById('age').value),
                education: parseInt(document.getElementById('education').value),
                currentSmoker: parseInt(document.getElementById('currentSmoker').value),
                cigsPerDay: parseFloat(document.getElementById('cigsPerDay').value || 0),
                BPMeds: parseInt(document.getElementById('BPMeds').value),
                prevalentStroke: parseInt(document.getElementById('prevalentStroke').value),
                prevalentHyp: parseInt(document.getElementById('prevalentHyp').value),
                diabetes: parseInt(document.getElementById('diabetes').value),
                totChol: parseFloat(document.getElementById('totChol').value || 200),
                sysBP: parseFloat(document.getElementById('sysBP').value),
                diaBP: parseFloat(document.getElementById('diaBP').value),
                BMI: parseFloat(document.getElementById('BMI').value || 25),
                heartRate: parseFloat(document.getElementById('heartRate').value || 75),
                glucose: parseFloat(document.getElementById('glucose').value || 80)
            };
            
            try {
                const response = await fetch('/api/predict/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // Afficher le résultat
                    resultCard.classList.add('show');
                    
                    // Supprimer les classes existantes
                    resultHeader.className = 'result-header';
                    
                    // Ajouter la classe selon le niveau de risque
                    if (result.risk_level === 'Élevé') {
                        resultHeader.classList.add('risk-eleve');
                        probabilityFill.classList.add('risk-eleve');
                    } else if (result.risk_level === 'Modéré') {
                        resultHeader.classList.add('risk-modere');
                        probabilityFill.classList.add('risk-modere');
                    } else {
                        resultHeader.classList.add('risk-faible');
                        probabilityFill.classList.add('risk-faible');
                    }
                    
                    resultTitle.textContent = result.prediction;
                    resultSubtitle.textContent = `Basé sur l'analyse des données médicales`;
                    probabilityFill.style.width = `${result.probability}%`;
                    probabilityText.textContent = `${result.probability}%`;
                    riskLevel.textContent = result.risk_level;
                    riskProbability.textContent = `${result.probability}%`;
                    
                    // Scroll vers le résultat
                    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    alert('Erreur: ' + JSON.stringify(result));
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur de connexion au serveur');
            } finally {
                // Réactiver le bouton
                submitBtn.disabled = false;
                submitBtn.innerHTML = '🔍 Prédire le risque';
            }
        });
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
